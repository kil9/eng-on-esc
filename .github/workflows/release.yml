name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and publish Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item target\release\eng-on-esc.exe dist\eng-on-esc.exe
          $hash = Get-FileHash dist\eng-on-esc.exe -Algorithm SHA256
          "{0}  eng-on-esc.exe" -f $hash.Hash.ToLower() | Out-File -FilePath dist\SHA256SUMS.txt -Encoding ascii

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/eng-on-esc.exe
            dist/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
